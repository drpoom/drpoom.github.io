---
layout: default
---

<section class="section post-container">
    <h1 class="section-title" style="margin-bottom: 1rem;">{{ page.title }} <span class="blink">_</span></h1>
    <p style="color: var(--text-muted); margin-bottom: 3rem; font-size: 0.9rem;">
        <i class="fa-regular fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }}
    </p>
    
    <div class="post-content">
        {{ content }}
    </div>

    <div style="margin-top: 4rem;">
        <a href="{{ '/' | relative_url }}#articles" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Back to Main System
        </a>
    </div>
</section>
